<style>
  :root {
    --blue: #0077CC;
    --blue-dark: #005FA3;
    --blue-light: #EBF5FF;
    --dark: #1A202C;
    --gray: #718096;
    --mid: #4A5568;
    --pearl: #EDF0F4;
    --light: #F7F8FA;
    --border: #D1D8E0;
    --white: #FFFFFF;
    --green: #16A34A;
    --radius: 12px;
    --font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: #E8EEF5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    color: var(--dark);
  }

  .app-wrapper {
    width: 100%;
    max-width: 700px;
  }

  /* HEADER */
  .app-header {
    background: var(--white);
    border-radius: 14px 14px 0 0;
    padding: 16px 24px 13px;
    border-bottom: 3px solid var(--blue);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-header .logo-area { display:flex; align-items:center; gap:14px; }
  .app-header .logo-img { height: 64px; width: auto; display: block; }
  .app-header .brand-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .app-header .tag { font-size: 10px; color: var(--gray); text-align: right; line-height: 1.6; }

  /* CARD */
  .app-card {
    background: var(--white);
    border-radius: 0 0 14px 14px;
    padding: 24px 24px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }

  /* PROGRESS */
  .progress {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 24px;
  }
  .progress-step {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    border: 2px solid var(--border);
    background: var(--pearl); color: var(--gray);
    transition: all .25s;
  }
  .progress-step.active { background: var(--blue); border-color: var(--blue); color: white; }
  .progress-step.done   { background: var(--blue); border-color: var(--blue); color: white; }
  .progress-line {
    flex: 1; height: 2px; background: var(--border); transition: background .25s;
  }
  .progress-line.done { background: var(--blue); }

  /* STEP HEAD */
  .step-meta { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
  .step-title { font-size: 22px; font-weight: 900; color: var(--dark); line-height: 1.2; margin-bottom: 18px; }

  /* GRID CARDS */
  .grid { display: grid; gap: 10px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3,1fr); }
  .grid-auto { grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); }
  .grid-mat  { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); }

  /* OPTION CARD */
  .opt-card {
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--white);
    cursor: pointer;
    transition: all .15s;
    padding: 14px 12px;
    user-select: none;
  }
  .opt-card:hover { border-color: #93C5FD; background: #F0F9FF; }
  .opt-card.selected { border-color: var(--blue); background: var(--blue-light); box-shadow: 0 0 0 3px rgba(0,119,204,.15); }
  .opt-card .ic { width: 44px; height: 44px; margin: 0 auto 10px; color: var(--blue); opacity: .7; transition: opacity .15s; }
  .opt-card:hover .ic, .opt-card.selected .ic { opacity: 1; }
  .opt-card.selected .ic { color: var(--blue-dark); }
  .opt-card .opt-label { font-size: 13px; font-weight: 800; color: var(--dark); line-height: 1.3; white-space: pre-line; margin-bottom: 5px; }
  .opt-card .opt-sub { font-size: 11px; color: var(--gray); line-height: 1.4; }
  .opt-card .opt-desc { font-size: 11px; color: var(--mid); line-height: 1.5; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: none; }
  .opt-card.selected .opt-desc, .opt-card:hover .opt-desc { display: block; }
  .opt-card.nel { text-align: center; padding: 18px 14px; }
  .opt-card.nel .big { font-size: 26px; font-weight: 900; color: var(--dark); transition: color .15s; }
  .opt-card.nel.selected .big { color: var(--blue); }
  .opt-card.nel .small { font-size: 12px; color: var(--gray); margin-top: 2px; }

  /* MATERIAL GROUPS */
  .mat-group { margin-bottom: 14px; }
  .mat-group-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 4px; }
  .mat-group-desc { font-size: 11px; color: var(--gray); line-height: 1.5; margin-bottom: 8px; padding: 6px 8px; background: var(--light); border-radius: 6px; border-left: 3px solid var(--border); }
  .iva-tag { display: inline-block; font-size: 9px; font-weight: 700; border-radius: 3px; padding: 1px 5px; margin-bottom: 5px; }
  .mat-name { font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.3; }

  /* FORM CLIENTE */
  .form-section { margin-bottom: 20px; }
  .form-section-title {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
    color: var(--blue); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1.5px solid var(--blue-light);
  }
  .form-grid { display: grid; gap: 10px; }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
  .form-grid-3 { grid-template-columns: 2fr 1fr 1fr; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label {
    font-size: 10px; font-weight: 700; color: var(--mid);
    text-transform: uppercase; letter-spacing: .07em;
    display: flex; align-items: center; gap: 4px;
  }
  .form-field label .req {
    color: #DC2626; font-size: 13px; line-height: 1; font-weight: 900;
  }
  .form-field label .opt-tag {
    font-size: 9px; font-weight: 600; color: #9CA3AF;
    background: #F3F4F6; border-radius: 3px; padding: 1px 6px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .form-field input, .form-field textarea {
    font-family: var(--font); font-size: 13px; color: var(--dark);
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 11px;
    transition: border-color .15s, box-shadow .15s;
    outline: none; width: 100%;
  }
  .form-field input:focus, .form-field textarea:focus {
    border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,119,204,.1);
  }
  .form-field input.invalid { border-color: #FCA5A5; background: #FFF5F5; }
  .form-field input.valid { border-color: #86EFAC; background: #F0FDF4; }
  /* required field wrapper highlight */
  .form-field.required-field > label::before {
    content: ""; display: inline-block;
    width: 3px; height: 14px; background: #DC2626;
    border-radius: 2px; margin-right: 4px; flex-shrink: 0;
  }
  .form-field textarea { resize: vertical; min-height: 64px; }
  .form-checkbox-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--light); border-radius: 8px;
    cursor: pointer; margin-bottom: 12px; user-select: none;
  }
  .form-checkbox-row input[type=checkbox] { width:16px; height:16px; accent-color: var(--blue); cursor:pointer; }
  .form-checkbox-row span { font-size: 12px; color: var(--mid); font-weight: 600; }

  /* UPLOAD */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 24px 20px;
    text-align: center; background: var(--light); transition: all .2s;
    cursor: pointer; margin-bottom: 14px; position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--blue); background: var(--blue-light); }
  .upload-zone.filled { border-color: var(--green); background: #F0FDF4; border-style: solid; }
  .upload-zone input[type=file] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
  .upload-ic { width:36px;height:36px;margin:0 auto 10px;color:var(--gray); }
  .upload-zone.filled .upload-ic { color: var(--green); }
  .upload-label { font-size:13px;font-weight:700;color:var(--dark);margin-bottom:4px; }
  .upload-sub { font-size:11px;color:var(--gray); }
  .upload-zone.filled .upload-sub { color: var(--green); font-weight:600; }
  .upload-req { display:inline-block;font-size:9px;font-weight:700;background:#FEF2F2;color:#DC2626;border-radius:4px;padding:1px 5px;margin-bottom:8px; }
  .upload-zone.filled .upload-req { background:#DCFCE7;color:#16A34A; }
  .upload-notice { font-size:11px;color:var(--gray);background:var(--pearl);border-radius:8px;padding:10px 14px;border-left:3px solid var(--blue);margin-bottom:18px;line-height:1.6; }

  /* SEND METHOD SELECTOR */
  .send-method-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px; }
  .send-method-card {
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:14px 10px;border-radius:12px;cursor:pointer;border:2px solid var(--border);
    background:var(--white);transition:all .15s;font-family:var(--font);user-select:none;
    position:relative;
  }
  .send-method-card:hover { border-color:#93C5FD; background:#F0F9FF; }
  .send-method-card.selected.email { border-color:#3B82F6; background:#EFF6FF; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
  .send-method-card.selected.whatsapp { border-color:#22C55E; background:#F0FDF4; box-shadow:0 0 0 3px rgba(34,197,94,.15); }
  .send-method-card.selected.zip { border-color:var(--blue); background:var(--blue-light); box-shadow:0 0 0 3px rgba(0,119,204,.15); }
  .send-method-card .check-dot {
    position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;
    border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;
    font-size:9px;color:white;transition:all .15s;
  }
  .send-method-card.selected .check-dot { background:var(--blue);border-color:var(--blue); }
  .send-method-label { font-size:12px;font-weight:800;color:var(--dark);text-align:center; }
  .send-method-sub { font-size:10px;color:var(--gray);text-align:center;line-height:1.4; }

  /* SUBMIT BUTTON */
  .submit-order-btn {
    width:100%;padding:15px;background:var(--blue);color:white;border:none;
    border-radius:10px;font-size:15px;font-weight:800;font-family:var(--font);
    cursor:pointer;transition:all .15s;margin-bottom:12px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .submit-order-btn:hover { background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,119,204,.3); }
  .submit-order-btn:disabled { background:#CBD5E1;cursor:not-allowed;transform:none;box-shadow:none; }

  /* CONFIRMATION SCREEN */
  .confirm-screen {
    text-align:center;padding:40px 20px;
  }
  .confirm-icon {
    width:72px;height:72px;background:#DCFCE7;border-radius:50%;
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  }
  .confirm-title { font-size:26px;font-weight:900;color:var(--dark);margin-bottom:8px; }
  .confirm-sub { font-size:14px;color:var(--gray);line-height:1.7;margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto; }
  .confirm-detail { background:var(--light);border-radius:10px;padding:14px 16px;margin-bottom:24px;text-align:left; }
  .confirm-detail-row { display:flex;justify-content:space-between;padding:4px 0;font-size:12px; }
  .confirm-detail-row span:first-child { color:var(--gray); }
  .confirm-detail-row span:last-child { font-weight:700;color:var(--dark); }

  /* EXTRAS */
  .extra-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--white);
    transition: all .14s; margin-bottom: 7px;
    user-select: none;
  }
  .extra-row:hover { border-color: #93C5FD; background: #F0F9FF; }
  .extra-row.selected { border-color: var(--blue); background: var(--blue-light); }
  .checkbox {
    width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
    border: 2px solid var(--border); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 800; transition: all .15s;
  }
  .extra-row.selected .checkbox { background: var(--blue); border-color: var(--blue); }
  .extra-label { flex: 1; font-size: 13px; font-weight: 600; color: var(--dark); }
  .extra-iva { font-size: 11px; color: var(--gray); font-weight: 400; margin-left: 5px; }
  .extra-price { font-size: 13px; font-weight: 800; flex-shrink: 0; }

  /* NAV */
  .nav-row { margin-top: 20px; display: flex; justify-content: space-between; gap: 12px; }
  .btn {
    padding: 11px 22px; border-radius: 8px; font-size: 14px;
    font-weight: 700; cursor: pointer; border: none; transition: all .15s;
    font-family: var(--font);
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { background: #CBD5E1; cursor: not-allowed; }
  .btn-secondary { background: var(--light); color: var(--dark); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--pearl); }

  /* RESULT */
  .price-hero {
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    border-radius: 14px; padding: 26px 24px; margin-bottom: 18px;
    color: white; box-shadow: 0 8px 28px rgba(0,119,204,.35);
  }
  .price-label { font-size: 12px; opacity: .8; margin-bottom: 2px; }
  .price-big { font-size: 50px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .price-extras { font-size: 13px; opacity: .8; margin-top: 8px; }
  .price-total { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .price-iva { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.25); font-size: 12px; opacity: .75; }

  .summary-box {
    background: var(--light); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  }
  .summary-head { font-size: 10px; font-weight: 800; color: var(--gray); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .summary-key { font-size: 12px; color: var(--gray); }
  .summary-val { font-size: 12px; font-weight: 700; color: var(--dark); }

  .disclaimer { font-size: 11px; color: var(--gray); line-height: 1.7; margin-bottom: 18px; }

  .disclaimer-box {
    display: flex; gap: 12px; align-items: flex-start;
    background: #FFFBEB; border: 1.5px solid #FCD34D;
    border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
  }
  .disclaimer-icon { color: #D97706; flex-shrink: 0; margin-top: 1px; }
  .disclaimer-title { font-size: 12px; font-weight: 800; color: #92400E; margin-bottom: 5px; }
  .disclaimer-text { font-size: 11px; color: #78350F; line-height: 1.7; }

  /* FOOTER */
  .app-footer { text-align: center; padding: 12px 0; font-size: 10px; color: var(--gray); }

  /* PRINT */
  @media print {
    body { background: white; padding: 0; }
    .app-wrapper { max-width: 100%; }
    .app-card { box-shadow: none; border-radius: 0; }
    .no-print { display: none !important; }
    .price-hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* Notification */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--dark); color: white; padding: 10px 18px;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    opacity: 0; transform: translateY(8px); transition: all .3s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Step container animation */
  .step-container { animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

function fmt(n) {
  if(n===0)return"Gratuito";
  return n.toFixed(1).replace(".",",")+"\u00a0€";
}

function getPrice(lavId,wf,matIdx,tb,nEl) {
  if(lavId==="sing_cem")  return P.sing_cem[wf][tb][matIdx];
  if(lavId==="sing_avv")  return P.sing_avv[wf][matIdx];
  if(lavId==="ponte_cem") return P.ponte_cem[wf][tb][nEl][matIdx];
  if(lavId==="ponte_avv") return P.ponte_avv[wf][nEl][matIdx];
  if(lavId==="barre")     return P.barre[wf][nEl][matIdx];
  if(lavId==="innova")    return P.innova[wf][tb][nEl][matIdx];
  if(lavId==="naturali")  return P.naturali[wf][matIdx];
  return 0;
}

function renderProgress() {
  const phases = buildPhases();
  if(state.done) { document.getElementById("progress-bar").innerHTML=""; return; }
  let html="";
  phases.forEach((p,i)=>{
    const done=i<state.step, active=i===state.step;
    const cls=done?"done":active?"active":"";
    const lbl=done?"✓":i+1;
    html+=`<div class="progress-step ${cls}">${lbl}</div>`;
    if(i<phases.length-1) html+=`<div class="progress-line ${done?"done":""}"></div>`;
  });
  document.getElementById("progress-bar").innerHTML=html;
}

function stepHead(num,total,title,sub) {
  return `<div class="step-meta">Passo ${num} di ${total} &middot; ${sub}</div>
          <div class="step-title">${title}</div>`;
}

function navRow(showBack, nextLabel="Avanti &rarr;", nextDisabled=false) {
  return `<div class="nav-row no-print">
    ${showBack?`<button class="btn btn-secondary" onclick="goBack()">&larr; Indietro</button>`:"<div></div>"}
    <button class="btn btn-primary" ${nextDisabled?"disabled":""} onclick="goNext()">${nextLabel}</button>

}

function uploadZone(key, label, sublabel, hint, accept, required) {
  const f = uploadedFiles[key];
  const filled = f ? " filled" : "";
  const reqHtml = required ? `<span class="upload-req">${f?"✓ Caricato":"Obbligatorio"}</span>` : "";
  const subText = f ? f.name : hint;
  const icUpload = `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 24V12M12 18l6-6 6 6"/><path d="M8 28h20"/></svg>`;
  const icDone = `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="13"/><polyline points="11,18 16,23 25,13"/></svg>`;
  return `<div class="upload-zone${filled}" id="zone-${key}"
    ondragover="event.preventDefault();this.classList.add('dragover')"
    ondragleave="this.classList.remove('dragover')"
    ondrop="handleDrop('${key}',event)">
    <input type="file" accept="${accept}" onchange="handleFile('${key}',this)">
    <div class="upload-ic">${f ? icDone : icUpload}</div>
    ${reqHtml}
    <div class="upload-label">${label}</div>
    <div class="upload-sub">${subText}</div>
    ${!f ? `<div style="font-size:10px;color:#a0aec0;margin-top:4px">${sublabel}</div>` : ""}
  </div>`;
}

function handleFile(key, input) {
  const file = input.files[0];
  if(!file) return;
  uploadedFiles[key] = file;
  render();
}

function handleDrop(key, event) {
  event.preventDefault();
  document.getElementById("zone-"+key)?.classList.remove("dragover");
  const file = event.dataTransfer.files[0];
  if(!file) return;
  uploadedFiles[key] = file;
  render();
}

function showSpinner(msg) {
  let el = document.getElementById("upload-spinner");
  if(!el) {
    el = document.createElement("div");
    el.id = "upload-spinner";
    el.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px`;
    document.body.appendChild(el);
  }
  el.innerHTML = `
    <div style="width:46px;height:46px;border:4px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="color:#fff;font-family:var(--font);font-size:14px;font-weight:600;text-align:center">${msg}</div>`;
  el.style.display = "flex";
}
function hideSpinner() {
  const el = document.getElementById("upload-spinner");
  if(el) el.style.display = "none";
}

async function buildZipBlob() {
  if(typeof JSZip === "undefined") return null;
  const zip = new JSZip();
  zip.file("config_ordine.txt", buildConfigText());
  const isStl = state.workflow==="stl";
  if(isStl) {
    if(uploadedFiles.stl)        zip.file(uploadedFiles.stl.name, uploadedFiles.stl);
    if(uploadedFiles.infoConstr) zip.file(uploadedFiles.infoConstr.name, uploadedFiles.infoConstr);
  } else {
    if(uploadedFiles.scan) zip.file(uploadedFiles.scan.name, uploadedFiles.scan);
  }
  return await zip.generateAsync({type:"blob"});
}

async function uploadZipGetLink(blob) {
  const fname = `ordine_${new Date().toISOString().slice(0,10)}_${(cliente.azienda||cliente.cognome||"AC").replace(/[^a-zA-Z0-9]/g,"_")}.zip`;

  // Step 1: get best available GoFile server
  const serverRes = await fetch("https://api.gofile.io/servers");
  if(!serverRes.ok) throw new Error(`GoFile servers: HTTP ${serverRes.status}`);
  const serverJson = await serverRes.json();
  if(serverJson.status !== "ok") throw new Error("GoFile: nessun server disponibile");
  const server = serverJson.data.servers[0].name;

  // Step 2: upload file to that server
  const fd = new FormData();
  fd.append("file", blob, fname);
  const upRes = await fetch(`https://${server}.gofile.io/uploadFile`, { method:"POST", body: fd });
  if(!upRes.ok) throw new Error(`Upload HTTP ${upRes.status}`);
  const upJson = await upRes.json();
  if(upJson.status !== "ok") throw new Error("GoFile upload fallito: " + upJson.status);

  return { link: upJson.data.downloadPage, name: fname };
}

      link
    ].filter(l => l !== null).join("\n");
    window.open(`https://wa.me/${CONTACT.whatsapp}?text=${encodeURIComponent(waText)}`, "_blank");

    state.orderSent = true;
    render();
  } catch(err) {
    hideSpinner();
    if(confirm("Errore inatteso (" + err.message + ").\nScaricare lo ZIP localmente?")) {
      doDownloadZip();
    }
  }
}

async function doDownloadZip() {
  const blob = await buildZipBlob();
  if(!blob) { alert("JSZip non disponibile."); return; }
  const a = document.createElement("a");
  const fname = `ordine_${new Date().toISOString().slice(0,10)}_AbutmentCompatibili.zip`;
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ZIP as primary send method: saves order to Supabase first, then downloads
async function doDownloadZipOrder() {
  try {
    showSpinner("Preparazione pacchetto ordine...");
    const blob = await buildZipBlob();
    if(!blob) { hideSpinner(); alert("JSZip non disponibile."); return; }

    // Try to upload to get a link for the DB record
    let link = null, name = null;
    try {
      const res = await uploadZipGetLink(blob);
      link = res.link; name = res.name;
    } catch(_) { /* upload fallback: save without link */ }

    await saveOrderToSupabase(link, name).catch(()=>{});
    hideSpinner();

    // Download locally
    const a = document.createElement("a");
    const fname = `ordine_${new Date().toISOString().slice(0,10)}_AbutmentCompatibili.zip`;
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);

    state.orderSent = true;
    render();
  } catch(err) {
    hideSpinner();
    alert("Errore: " + err.message);
  }
}

function goNext() {
  const phases=buildPhases();
  if(state.step<phases.length-1) { state.step++; render(); }
  else { state.done=true; render(); }
}
function goBack() {
  if(state.step>0) { state.step--; render(); }
}
function resetApp() {
  state.step=0; state.lavId=null; state.nElIdx=null; state.matIdx=null;
  state.tiBase=null; state.workflow=null; state.done=false;
  state.sendMethod=null; state.orderSent=false;
  uploadedFiles.stl=null; uploadedFiles.infoConstr=null; uploadedFiles.scan=null;
  Object.assign(cliente, {
    nome:"", cognome:"", azienda:"", telefono:"", email:"", piva:"",
    indFattura:"", capFattura:"", cittaFattura:"", provFattura:"",
    sameSpedizione:true,
    indSpedizione:"", capSpedizione:"", cittaSpedizione:"", provSpedizione:"",
    note:""
  });
  render();
}

function doPrint() { window.print(); }

function doCopy(text) {
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>showToast()).catch(()=>{});
  } else {
    const ta=document.createElement("textarea");
    ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); showToast();
  }
}

function showToast() {
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// INIT
render();
</script>
