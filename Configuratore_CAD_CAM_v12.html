<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Ordini CAD CAM — AbutmentCompatibili.com</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --blue:       #0065B3;
    --blue-mid:   #0077CC;
    --blue-dark:  #005FA3;
    --blue-light: #E8F4FF;
    --blue-glow:  rgba(0,101,179,.16);
    --dark:       #0F1923;
    --mid:        #3D5166;
    --gray:       #7A90A4;
    --pearl:      #F0F5FA;
    --light:      #F7F9FC;
    --border:     #D6E4F0;
    --white:      #FFFFFF;
    --green:      #0D9E6E;
    --radius:     14px;
    --font:       'Plus Jakarta Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: #E2EBF5;
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(0,101,179,.08) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(0,101,179,.05) 0%, transparent 50%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
    color: var(--dark);
  }

  .app-wrapper {
    width: 100%;
    max-width: 700px;
  }

  /* HEADER */
  .app-header {
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 18px 28px 15px;
    border-bottom: 3px solid var(--blue);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-header .logo-area { display:flex; align-items:center; gap:16px; }
  .app-header .logo-img { height: 88px; width: auto; display: block; filter: drop-shadow(0 1px 3px rgba(0,0,0,.08)); }
  .app-header .brand-sub { font-size: 11.5px; font-weight: 600; color: var(--gray); margin-top: 3px; letter-spacing:.01em; }
  .app-header .tag { font-size: 10px; font-weight: 700; color: var(--gray); text-align: right; line-height: 1.6; letter-spacing:.02em; }

  /* CARD */
  .app-card {
    background: var(--white);
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 28px 28px 30px;
    box-shadow: 0 8px 40px rgba(0,50,100,.12), 0 2px 8px rgba(0,50,100,.07);
  }

  /* PROGRESS */
  .progress {
    display: flex;
    align-items: center;
    margin-bottom: 28px;
    padding: 0 2px;
    position: relative;
  }
  .progress-step {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
    border: 2.5px solid var(--border);
    background: var(--white); color: var(--gray);
    transition: all .3s cubic-bezier(.22,.68,0,1.2);
    position: relative; z-index: 1;
  }
  .progress-step.active {
    background: var(--white); border-color: var(--blue); color: var(--blue);
    box-shadow: 0 0 0 4px var(--blue-glow); font-weight: 900;
  }
  .progress-step.done {
    background: var(--blue); border-color: var(--blue); color: white;
    box-shadow: 0 0 0 4px var(--blue-glow);
  }
  .progress-line {
    flex: 1; height: 2.5px; background: var(--border);
    transition: background .4s ease; border-radius: 2px;
  }
  .progress-line.done { background: var(--blue); }

  /* STEP HEAD */
  .step-meta { font-size: 10px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
  .step-title { font-size: 26px; font-weight: 900; color: var(--dark); line-height: 1.1; margin-bottom: 22px; letter-spacing:-.02em; }

  /* GRID CARDS */
  .grid { display: grid; gap: 10px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3,1fr); }
  .grid-auto { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .grid-mat  { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); }

  /* OPTION CARD */
  .opt-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    cursor: pointer;
    transition: all .18s cubic-bezier(.22,.68,0,1.2);
    padding: 16px 12px 14px;
    user-select: none;
    position: relative; overflow: hidden;
  }
  .opt-card::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, var(--blue-light) 0%, transparent 70%);
    opacity:0; transition:opacity .18s; pointer-events:none;
  }
  .opt-card:hover { border-color: #93C5FD; transform: translateY(-2px); box-shadow: 0 6px 20px var(--blue-glow); }
  .opt-card:hover::before { opacity:.5; }
  .opt-card.selected {
    border-color: var(--blue); background: var(--blue-light);
    box-shadow: 0 0 0 3px var(--blue-glow), 0 6px 20px var(--blue-glow);
    transform: translateY(-2px);
  }
  .opt-card.selected::before { opacity:1; }
  .opt-card .ic { width: 48px; height: 48px; margin: 0 auto 10px; color: var(--blue); opacity: .65; transition: opacity .18s, transform .18s; }
  .opt-card:hover .ic, .opt-card.selected .ic { opacity: 1; transform: scale(1.08); }
  .opt-card .opt-label { font-size: 13px; font-weight: 800; color: var(--dark); line-height: 1.3; white-space: pre-line; margin-bottom: 4px; }
  .opt-card .opt-sub { font-size: 11px; color: var(--gray); line-height: 1.4; font-weight:500; }
  .opt-card .opt-desc { font-size: 11px; color: var(--mid); line-height: 1.5; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: none; }
  .opt-card.selected .opt-desc, .opt-card:hover .opt-desc { display: block; }
  .opt-card.nel { text-align: center; padding: 20px 14px; }
  .opt-card.nel .big { font-size: 28px; font-weight: 900; color: var(--dark); transition: color .15s; letter-spacing:-.02em; }
  .opt-card.nel.selected .big { color: var(--blue); }
  .opt-card.nel .small { font-size: 12px; color: var(--gray); margin-top: 2px; font-weight:500; }

  /* MATERIAL GROUPS */
  .mat-group { margin-bottom: 14px; }
  .mat-group-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 4px; }
  .mat-group-desc { font-size: 11px; color: var(--gray); line-height: 1.5; margin-bottom: 8px; padding: 6px 8px; background: var(--light); border-radius: 6px; border-left: 3px solid var(--border); }
  .iva-tag { display: inline-block; font-size: 9px; font-weight: 700; border-radius: 3px; padding: 1px 5px; margin-bottom: 5px; }
  .mat-name { font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.3; }

  /* FORM CLIENTE */
  .form-section { margin-bottom: 20px; }
  .form-section-title {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
    color: var(--blue); margin-bottom: 12px;
    display:flex; align-items:center; gap:8px;
  }
  .form-section-title::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
  .form-grid { display: grid; gap: 10px; }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
  .form-grid-3 { grid-template-columns: 2fr 1fr 1fr; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label {
    font-size: 10px; font-weight: 700; color: var(--mid);
    text-transform: uppercase; letter-spacing: .07em;
    display: flex; align-items: center; gap: 4px;
  }
  .form-field label .req {
    color: #DC2626; font-size: 13px; line-height: 1; font-weight: 900;
  }
  .form-field label .opt-tag {
    font-size: 9px; font-weight: 600; color: #9CA3AF;
    background: #F3F4F6; border-radius: 3px; padding: 1px 6px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .form-field input, .form-field textarea {
    font-family: var(--font); font-size: 13px; color: var(--dark);
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 11px;
    transition: border-color .15s, box-shadow .15s;
    outline: none; width: 100%;
  }
  .form-field input:focus, .form-field textarea:focus {
    border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,119,204,.1);
  }
  .form-field input.invalid { border-color: #FCA5A5; background: #FFF5F5; }
  .form-field input.valid { border-color: #86EFAC; background: #F0FDF4; }
  /* required field wrapper highlight */
  .form-field.required-field > label::before {
    content: ""; display: inline-block;
    width: 3px; height: 14px; background: #DC2626;
    border-radius: 2px; margin-right: 4px; flex-shrink: 0;
  }
  .form-field textarea { resize: vertical; min-height: 64px; }
  .form-checkbox-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--light); border-radius: 8px;
    cursor: pointer; margin-bottom: 12px; user-select: none;
  }
  .form-checkbox-row input[type=checkbox] { width:16px; height:16px; accent-color: var(--blue); cursor:pointer; }
  .form-checkbox-row span { font-size: 12px; color: var(--mid); font-weight: 600; }

  /* UPLOAD */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 24px 20px;
    text-align: center; background: var(--light); transition: all .2s;
    cursor: pointer; margin-bottom: 14px; position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--blue); background: var(--blue-light); }
  .upload-zone.filled { border-color: var(--green); background: #F0FDF4; border-style: solid; }
  .upload-zone input[type=file] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
  .upload-ic { width:36px;height:36px;margin:0 auto 10px;color:var(--gray); }
  .upload-zone.filled .upload-ic { color: var(--green); }
  .upload-label { font-size:13px;font-weight:700;color:var(--dark);margin-bottom:4px; }
  .upload-sub { font-size:11px;color:var(--gray); }
  .upload-zone.filled .upload-sub { color: var(--green); font-weight:600; }
  .upload-req { display:inline-block;font-size:9px;font-weight:700;background:#FEF2F2;color:#DC2626;border-radius:4px;padding:1px 5px;margin-bottom:8px; }
  .upload-zone.filled .upload-req { background:#DCFCE7;color:#16A34A; }
  .upload-notice { font-size:11px;color:var(--gray);background:var(--pearl);border-radius:8px;padding:10px 14px;border-left:3px solid var(--blue);margin-bottom:18px;line-height:1.6; }

  /* SEND METHOD SELECTOR */
  .send-method-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px; }
  .send-method-card {
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:14px 10px;border-radius:12px;cursor:pointer;border:2px solid var(--border);
    background:var(--white);transition:all .15s;font-family:var(--font);user-select:none;
    position:relative;
  }
  .send-method-card:hover { border-color:#93C5FD; background:#F0F9FF; }
  .send-method-card.selected.email { border-color:#3B82F6; background:#EFF6FF; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
  .send-method-card.selected.whatsapp { border-color:#22C55E; background:#F0FDF4; box-shadow:0 0 0 3px rgba(34,197,94,.15); }
  .send-method-card.selected.zip { border-color:var(--blue); background:var(--blue-light); box-shadow:0 0 0 3px rgba(0,119,204,.15); }
  .send-method-card .check-dot {
    position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;
    border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;
    font-size:9px;color:white;transition:all .15s;
  }
  .send-method-card.selected .check-dot { background:var(--blue);border-color:var(--blue); }
  .send-method-label { font-size:12px;font-weight:800;color:var(--dark);text-align:center; }
  .send-method-sub { font-size:10px;color:var(--gray);text-align:center;line-height:1.4; }

  /* SUBMIT BUTTON */
  .submit-order-btn {
    width:100%; padding:22px 28px; border-radius:16px; border:none;
    background: linear-gradient(135deg, #0077CC 0%, #0050A0 100%);
    color:white; font-family:var(--font);
    font-size:19px; font-weight:900; letter-spacing:.02em;
    cursor:pointer; transition:all .22s cubic-bezier(.22,.68,0,1.2);
    margin-bottom:16px; margin-top:10px;
    display:flex; align-items:center; justify-content:center; gap:12px;
    box-shadow: 0 8px 32px rgba(0,100,180,.45), 0 2px 0 rgba(255,255,255,.1) inset;
    position: relative; overflow: hidden;
  }
  .submit-order-btn::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 50%);
    pointer-events:none;
  }
  .submit-order-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 18px 50px rgba(0,100,180,.55), 0 2px 0 rgba(255,255,255,.1) inset;
  }
  .submit-order-btn:active:not(:disabled) { transform: translateY(-1px) scale(.99); }
  .submit-order-btn:disabled { background: linear-gradient(135deg,#CBD5E1,#94A3B8); cursor:not-allowed; transform:none; box-shadow:none; }
  .submit-order-btn .send-icon { transition: transform .22s ease; font-size:22px; }
  .submit-order-btn:hover:not(:disabled) .send-icon { transform: translateX(7px); }

  /* CONFIRMATION SCREEN */
  .confirm-screen {
    text-align:center;padding:40px 20px;
  }
  .confirm-icon {
    width:72px;height:72px;background:#DCFCE7;border-radius:50%;
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  }
  .confirm-title { font-size:26px;font-weight:900;color:var(--dark);margin-bottom:8px; }
  .confirm-sub { font-size:14px;color:var(--gray);line-height:1.7;margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto; }
  .confirm-detail { background:var(--light);border-radius:10px;padding:14px 16px;margin-bottom:24px;text-align:left; }
  .confirm-detail-row { display:flex;justify-content:space-between;padding:4px 0;font-size:12px; }
  .confirm-detail-row span:first-child { color:var(--gray); }
  .confirm-detail-row span:last-child { font-weight:700;color:var(--dark); }

  /* EXTRAS */
  .extra-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--white);
    transition: all .14s; margin-bottom: 7px;
    user-select: none;
  }
  .extra-row:hover { border-color: #93C5FD; background: #F0F9FF; }
  .extra-row.selected { border-color: var(--blue); background: var(--blue-light); }
  .checkbox {
    width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
    border: 2px solid var(--border); background: var(--white);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 800; transition: all .15s;
  }
  .extra-row.selected .checkbox { background: var(--blue); border-color: var(--blue); }
  .extra-label { flex: 1; font-size: 13px; font-weight: 600; color: var(--dark); }
  .extra-iva { font-size: 11px; color: var(--gray); font-weight: 400; margin-left: 5px; }
  .extra-price { font-size: 13px; font-weight: 800; flex-shrink: 0; }

  /* NAV */
  .nav-row { margin-top: 22px; display: flex; justify-content: space-between; gap: 12px; }
  .btn {
    padding: 11px 22px; border-radius: 10px; font-size: 13px;
    font-weight: 700; cursor: pointer; border: none; transition: all .18s;
    font-family: var(--font); display:flex; align-items:center; gap:6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue-mid) 0%, var(--blue) 100%);
    color: white; padding: 12px 28px; font-size: 14px; font-weight: 800;
    box-shadow: 0 4px 16px var(--blue-glow); letter-spacing:.01em;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,101,179,.35);
  }
  .btn-primary:disabled { background: linear-gradient(135deg,#CBD5E1,#94A3B8); box-shadow:none; cursor: not-allowed; }
  .btn-secondary { background: var(--pearl); color: var(--mid); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: #E2EAF3; border-color: #B0C4D8; }

  /* RESULT */
  .price-hero {
    background: linear-gradient(135deg, #0F2A42 0%, #0F1923 100%);
    border-radius: var(--radius); padding: 26px 28px; margin-bottom: 18px;
    color: white; box-shadow: 0 10px 36px rgba(0,50,100,.35);
    position:relative; overflow:hidden;
  }
  .price-hero::before {
    content:''; position:absolute; top:-50px; right:-50px;
    width:180px; height:180px; border-radius:50%;
    background: radial-gradient(circle, rgba(0,119,204,.28), transparent 70%);
  }
  .price-label { font-size: 10px; font-weight:800; opacity:.5; margin-bottom: 6px; text-transform:uppercase; letter-spacing:.12em; }
  .price-big { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .price-big span { font-size:24px; font-weight:700; opacity:.7; margin-left:4px; }
  .price-extras { font-size: 13px; opacity: .8; margin-top: 8px; }
  .price-total { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .price-iva { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.18); font-size: 12px; opacity: .5; font-weight:500; }

  .summary-box {
    border: 1.5px solid var(--border); border-radius: 12px; overflow:hidden; margin-bottom: 16px;
  }
  .summary-head {
    font-size: 10px; font-weight: 800; color: var(--blue);
    text-transform: uppercase; letter-spacing: .1em;
    background: var(--blue-light); padding: 8px 16px;
    border-bottom: 1px solid var(--border);
  }
  .summary-row { display: flex; justify-content: space-between; align-items:baseline; padding: 9px 16px; border-bottom: 1px solid var(--pearl); }
  .summary-row:last-child { border-bottom: none; }
  .summary-key { font-size: 12px; color: var(--gray); font-weight:500; }
  .summary-val { font-size: 12px; font-weight: 700; color: var(--dark); text-align:right; }

  .disclaimer { font-size: 11px; color: var(--gray); line-height: 1.7; margin-bottom: 18px; }

  .disclaimer-box {
    display: flex; gap: 12px; align-items: flex-start;
    background: #FFFBEB; border: 1.5px solid #FCD34D;
    border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
  }
  .disclaimer-icon { color: #D97706; flex-shrink: 0; margin-top: 1px; }
  .disclaimer-title { font-size: 12px; font-weight: 800; color: #92400E; margin-bottom: 5px; }
  .disclaimer-text { font-size: 11px; color: #78350F; line-height: 1.7; }

  /* DENTAL MAP */
  .dental-map-wrap { margin-bottom: 18px; margin-top: 6px; }
  .dental-map-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--blue); margin-bottom: 12px; }
  .dental-arch { display: flex; gap: 2px; justify-content: center; flex-wrap: nowrap; align-items: flex-end; }
  .dental-arch.lower { align-items: flex-start; }
  .dental-arch-label { font-size: 9px; color: var(--gray); text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 4px 0; display: block; }
  .dental-midline { width: 1px; background: #CBD5E1; align-self: stretch; margin: 0 3px; flex-shrink: 0; }
  .dental-separator { height: 10px; border-top: 2px dashed #CBD5E1; margin: 5px 0; }

  /* Tooth SVG buttons */
  .tooth-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    cursor: pointer; flex-shrink: 0;
    transition: transform .12s ease, filter .12s ease;
    outline: none; background: none; border: none; padding: 0 2px;
  }
  .tooth-btn:hover { transform: scale(1.14); }
  .tooth-btn:hover .tooth-svg path.crown { fill: #DBEAFE; stroke: #3B82F6; }
  .tooth-btn.selected .tooth-svg path.crown { fill: #BFDBFE; stroke: var(--blue); stroke-width: 2; }
  .tooth-btn.selected { filter: drop-shadow(0 0 5px rgba(0,119,204,.55)); transform: scale(1.10); }
  .tooth-btn .tn {
    font-size: 9px; font-weight: 800; color: var(--gray);
    line-height: 1; transition: color .12s; display: block;
  }
  .tooth-btn.selected .tn { color: var(--blue); }
  .tooth-svg path.crown { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.5; transition: fill .12s, stroke .12s; }
  .tooth-svg path.root  { fill: #F1F5F9; stroke: #CBD5E1; stroke-width: 1; transition: fill .12s, stroke .12s; }
  .tooth-btn:hover .tooth-svg path.root  { stroke: #93C5FD; }
  .tooth-btn.selected .tooth-svg path.root { fill: #EFF6FF; stroke: #93C5FD; }

  .selected-teeth-display {
    min-height: 32px; background: linear-gradient(135deg, #EFF6FF, #DBEAFE);

function fmt(n) {
  if(n===0)return"Gratuito";
  return n.toFixed(1).replace(".",",")+"\u00a0€";
}

function getPrice(lavId,wf,matIdx,tb,nEl) {
  const w = wf || "stl";
  const t = tb || "con";
  const n = nEl || 0;
  try {
    const mats = MATERIALI[lavId] || [];
    const mat  = mats[matIdx];
    const pi   = (mat && mat.pIdx !== undefined) ? mat.pIdx : matIdx; // usa pIdx se disponibile
    if(lavId==="sing_cem")  return P.sing_cem[w][t][pi];
    if(lavId==="sing_avv")  return P.sing_avv[w][pi];
    if(lavId==="ponte_cem") return P.ponte_cem[w][t][n][pi];
    if(lavId==="ponte_avv") return P.ponte_avv[w][n][pi];
    if(lavId==="barre")     return P.barre[w][n][pi];
    if(lavId==="innova")    return P.innova[w][t][n][pi];
    if(lavId==="naturali")  return P.naturali[w][pi];
  } catch(e) { return 0; }
  return 0;
}

      clinico.connessione     ? "Connessione: "+clinico.connessione : null,
      clinico.noteTecniche    ? "Note tecniche: "+clinico.noteTecniche : null,
    ].filter(Boolean).join(" | ") || null,
    prezzo_base: base,
    iva: mat ? mat.iva : 4,
    file_link: fileLink || null,
    file_name: fileName || null,
    status: "ricevuto"
  };

  console.log("📤 Invio a Supabase:", payload);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const errText = await res.text();
    console.error("❌ Supabase errore", res.status, errText);
    throw new Error(`Supabase ${res.status}: ${errText}`);
  }
  console.log("✅ Ordine salvato su Supabase");
}

function renderProgress() {
  const phases = buildPhases();
  if(state.done) { document.getElementById("progress-bar").innerHTML=""; return; }
  let html="";
  phases.forEach((p,i)=>{
    const done=i<state.step, active=i===state.step;
    const cls=done?"done":active?"active":"";
    const lbl=done?"✓":i+1;
    html+=`<div class="progress-step ${cls}">${lbl}</div>`;
    if(i<phases.length-1) html+=`<div class="progress-line ${done?"done":""}"></div>`;
  });
  document.getElementById("progress-bar").innerHTML=html;
}

function stepHead(num,total,title,sub) {
  return `<div class="step-meta">Passo ${num} di ${total} &middot; ${sub}</div>
          <div class="step-title">${title}</div>`;
}

function navRow(showBack, nextLabel="Avanti &rarr;", nextDisabled=false) {
  return `<div class="nav-row no-print">
    ${showBack?`<button class="btn btn-secondary" onclick="goBack()">&larr; Indietro</button>`:"<div></div>"}
    <button class="btn btn-primary" ${nextDisabled?"disabled":""} onclick="goNext()">${nextLabel}</button>
  </div>`;
}

    function toothType(n) {
      const d = n % 10;
      if(d===1||d===2) return "incisor";
      if(d===3) return "canine";
      if(d===4||d===5) return "premolar";
      return "molar";
    }
    // SVG path per tipo dente — upper arch (roots point down, crown up)
    function toothSVG(n, isUpper) {
      const type = toothType(n);
      const sel = clinico.denti.includes(n) ? "selected" : "";
      let crown="", root="";
      if(type==="incisor") {
        crown = isUpper

        root = isUpper

        root = isUpper
          ? "M8,23 Q8,36 12,38 Q16,36 16,23Z"
          : "M8,20 Q8,7 12,5 Q16,7 16,20Z";
      } else if(type==="premolar") {

          ? "M4,20 Q4,8 8,6 L12,5 L16,6 Q20,8 20,20 Q20,23 12,24 Q4,23 4,20Z"

        root = isUpper
          ? "M7,24 Q7,33 10,35 M17,24 Q17,33 14,35"
          : "M7,19 Q7,10 10,8 M17,19 Q17,10 14,8";
      } else { // molar
        crown = isUpper
          ? "M3,21 Q3,8 7,6 L12,5 L17,6 Q21,8 21,21 Q21,25 12,26 Q3,25 3,21Z"
          : "M3,5 Q3,1 12,0 Q21,1 21,5 Q21,18 17,20 L12,21 L7,20 Q3,18 3,5Z";
        root = isUpper
          ? "M6,26 Q6,34 9,36 M12,26 Q12,35 12,37 M18,26 Q18,34 15,36"
          : "M6,21 Q6,13 9,11 M12,21 Q12,12 12,10 M18,21 Q18,13 15,11";
      }
      // Mascella: corona in alto, radici in basso → numero sotto
      // Mandibola: corona in basso, radici in alto → numero sopra
      return isUpper
        ? `<button class="tooth-btn ${sel}" onclick="toggleDente(${n})" title="Dente ${n}">

// ── Clinico actions ───────────────────────────────────────────
function toggleDente(n) {
  const idx = clinico.denti.indexOf(n);
  if(idx>-1) clinico.denti.splice(idx,1);
  else clinico.denti.push(n);
  render();
}
function selectShade(s)       { clinico.shade = clinico.shade===s ? null : s; render(); }
function selectTranslucenza(t){ clinico.translucenza = clinico.translucenza===t ? null : t; clinico.shade=null; render(); }
function selectUrgenza(u) { clinico.urgenza = clinico.urgenza===u ? null : u; render(); }

// ── File upload ──────────────────────────────────────────────

function uploadZone(key, label, sublabel, hint, accept, required) {
  const f = uploadedFiles[key];
  const filled = f ? " filled" : "";
  const reqHtml = required ? `<span class="upload-req">${f?"✓ Caricato":"Obbligatorio"}</span>` : "";
  const subText = f ? f.name : hint;
  const icUpload = `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 24V12M12 18l6-6 6 6"/><path d="M8 28h20"/></svg>`;
  const icDone = `<svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="13"/><polyline points="11,18 16,23 25,13"/></svg>`;
  return `<div class="upload-zone${filled}" id="zone-${key}"
    ondragover="event.preventDefault();this.classList.add('dragover')"
    ondragleave="this.classList.remove('dragover')"
    ondrop="handleDrop('${key}',event)">
    <input type="file" accept="${accept}" onchange="handleFile('${key}',this)">
    <div class="upload-ic">${f ? icDone : icUpload}</div>
    ${reqHtml}
    <div class="upload-label">${label}</div>
    <div class="upload-sub">${subText}</div>
    ${!f ? `<div style="font-size:10px;color:#a0aec0;margin-top:4px">${sublabel}</div>` : ""}
  </div>`;
}

function handleFile(key, input) {
  const file = input.files[0];
  if(!file) return;
  uploadedFiles[key] = file;
  render();
}

function handleDrop(key, event) {
  event.preventDefault();
  document.getElementById("zone-"+key)?.classList.remove("dragover");
  const file = event.dataTransfer.files[0];
  if(!file) return;
  uploadedFiles[key] = file;
  render();
}

async function buildZipBlob() {
  if(typeof JSZip === "undefined") return null;
  const zip = new JSZip();
  zip.file("config_ordine.txt", buildConfigText());
  if(uploadedFiles.stl)        zip.file(uploadedFiles.stl.name, uploadedFiles.stl);
  if(uploadedFiles.infoConstr) zip.file(uploadedFiles.infoConstr.name, uploadedFiles.infoConstr);
  return await zip.generateAsync({type:"blob"});
}

async function uploadZipGetLink(blob) {
  const fname = `ordine_${new Date().toISOString().slice(0,10)}_${(cliente.azienda||cliente.cognome||"AC").replace(/[^a-zA-Z0-9]/g,"_")}.zip`;
  const errors = [];

  // ── Provider 1: GoFile ────────────────────────────────────────
  try {
    console.log("📤 Tentativo upload GoFile...");
    const serverRes = await fetch("https://api.gofile.io/servers");
    if(!serverRes.ok) throw new Error(`GoFile servers HTTP ${serverRes.status}`);
    const serverJson = await serverRes.json();
    if(serverJson.status !== "ok") throw new Error("GoFile nessun server");
    const server = serverJson.data.servers[0].name;
    const fd = new FormData();
    fd.append("file", blob, fname);
    const upRes = await fetch(`https://${server}.gofile.io/uploadFile`, { method:"POST", body: fd });
    if(!upRes.ok) throw new Error(`GoFile upload HTTP ${upRes.status}`);
    const upJson = await upRes.json();
    if(upJson.status !== "ok") throw new Error("GoFile upload: "+upJson.status);
    console.log("✅ Upload GoFile OK:", upJson.data.downloadPage);
    return { link: upJson.data.downloadPage, name: fname };
  } catch(e) {
    errors.push("GoFile: "+e.message);
    console.warn("⚠️ GoFile fallito:", e.message);
  }

  // ── Provider 2: file.io ───────────────────────────────────────
  try {
    console.log("📤 Tentativo upload file.io...");
    const fd2 = new FormData();
    fd2.append("file", blob, fname);
    fd2.append("expires", "14d");
    fd2.append("maxDownloads", "100");
    const upRes2 = await fetch("https://file.io", { method:"POST", body: fd2 });
    if(!upRes2.ok) throw new Error(`file.io HTTP ${upRes2.status}`);
    const upJson2 = await upRes2.json();
    if(!upJson2.success || !upJson2.link) throw new Error("file.io risposta non valida");
    console.log("✅ Upload file.io OK:", upJson2.link);
    return { link: upJson2.link, name: fname };
  } catch(e) {
    errors.push("file.io: "+e.message);
    console.warn("⚠️ file.io fallito:", e.message);
  }

  // ── Provider 3: catbox.moe ────────────────────────────────────
  try {
    console.log("📤 Tentativo upload catbox.moe...");
    const fd3 = new FormData();
    fd3.append("reqtype", "fileupload");
    fd3.append("fileToUpload", blob, fname);
    const upRes3 = await fetch("https://catbox.moe/user/api.php", { method:"POST", body: fd3 });
    if(!upRes3.ok) throw new Error(`catbox HTTP ${upRes3.status}`);
    const link3 = await upRes3.text();
    if(!link3.startsWith("https://")) throw new Error("catbox risposta non valida: "+link3);
    console.log("✅ Upload catbox OK:", link3);
    return { link: link3.trim(), name: fname };
  } catch(e) {
    errors.push("catbox: "+e.message);
    console.warn("⚠️ catbox fallito:", e.message);
  }

  // Tutti e tre i provider falliti
  throw new Error("Tutti i provider falliti:\n" + errors.join("\n"));
}

async function doDownloadZip() {
  const blob = await buildZipBlob();
  if(!blob) { alert("JSZip non disponibile."); return; }
  const a = document.createElement("a");
  const fname = `ordine_${new Date().toISOString().slice(0,10)}_AbutmentCompatibili.zip`;
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ZIP as primary send method: saves order to Supabase first, then downloads
async function doDownloadZipOrder() {
  try {
    showSpinner("Preparazione pacchetto ordine...");
    const blob = await buildZipBlob();
    if(!blob) { hideSpinner(); alert("JSZip non disponibile."); return; }

    // Try to upload to get a link for the DB record
    let link = null, name = null;
    try {
      const res = await uploadZipGetLink(blob);
      link = res.link; name = res.name;
    } catch(_) { /* upload fallback: save without link */ }

    await saveOrderToSupabase(link, name).catch(e=>{console.error('Supabase error:',e);alert('⚠️ Ordine non salvato nel sistema: '+e.message+'\n\nContattare ordini@abutmentcompatibili.com');});
    await sendEmailJSNotification(link);
    hideSpinner();

    // Download locally
    const fname = `ordine_${new Date().toISOString().slice(0,10)}_AbutmentCompatibili.zip`;
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);

    state.orderSent = true;
    render();
  } catch(err) {
    hideSpinner();
    alert("Errore: " + err.message);
  }
}

function goNext() {
  const phases=buildPhases();
  if(state.step<phases.length-1) { state.step++; render(); }
  else { state.done=true; render(); }
}
function goBack() {
  if(state.step>0) { state.step--; render(); }
}

function doCopy(text) {
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>showToast()).catch(()=>{});
  } else {
    const ta=document.createElement("textarea");
    ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); showToast();
  }
}

function showToast() {
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

  }

  // Flusso standard — serve almeno lavorazione + materiale
  if(state.lavId === null || state.matIdx === null) {
    bar.style.display = 'none';
    return;
  }

  const base = getPrice(state.lavId, state.workflow, state.matIdx, state.tiBase, state.nElIdx);
  if(!base || base === 0) { bar.style.display = 'none'; return; }

  const mats = MATERIALI[state.lavId] || [];
  const mat  = mats[state.matIdx];
  const iva  = mat ? mat.iva : 22;
  const withIva = base * (1 + iva/100);
  const lav  = LAVORAZIONI.find(x => x.id === state.lavId);
  const lavNome = lav ? lav.l.replace('\n',' ') : '';
  const matNome = mat ? mat.n : '';

  bar.style.display = 'flex';
  bar.innerHTML = `
    <div class="price-bar-name">${lavNome}${matNome ? ' · ' + matNome : ''}</div>
    <div class="price-bar-right">
      <div class="price-bar-chip">Prezzo indicativo</div>
      <div class="price-bar-value">${fmt(base)}</div>
      <div class="price-bar-iva">IVA ${iva}% inclusa: ${fmt(withIva)}</div>
    </div>`;
}

// INIT
render();

// ═══════════════════════════════════════════════════════
// PWA — Service Worker + Banner Installa
// ═══════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('✓ SW registrato:', reg.scope);
    }).catch(err => console.warn('SW non registrato:', err));
  });
}

// Banner "Installa App" — appare solo quando Chrome supporta l'installazione
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;

  // Crea il banner
  const banner = document.createElement('div');
  banner.id = 'pwa-install-banner';
  banner.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;flex:1">
      <img src="icon-192.png" style="width:36px;height:36px;border-radius:8px;flex-shrink:0" onerror="this.style.display='none'">
      <div>
        <div style="font-size:12px;font-weight:800;color:#fff">Installa l'app sul desktop</div>
        <div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:1px">Accesso rapido senza aprire il browser</div>
      </div>
    </div>
    <button id="pwa-install-btn" style="
      background:linear-gradient(135deg,#FF8C42,#E879F9);
      border:none; color:#fff; font-size:11px; font-weight:800;
      padding:7px 16px; border-radius:20px; cursor:pointer;
      white-space:nowrap; flex-shrink:0;
    ">⬇ Installa</button>
    <button id="pwa-dismiss-btn" style="
      background:none; border:none; color:rgba(255,255,255,.4);
      font-size:18px; cursor:pointer; padding:0 4px; flex-shrink:0;
    ">✕</button>`;
  banner.style.cssText = `
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(160deg,#1C0E2E,#2E1A4A);
    border-top:1.5px solid rgba(220,140,255,.2);
    box-shadow:0 -6px 32px rgba(200,100,255,.18);
    display:flex; align-items:center; gap:12px;
    padding:12px 18px 16px; z-index:200;
    font-family:'Plus Jakarta Sans',sans-serif;
  `;

  document.body.appendChild(banner);

  document.getElementById('pwa-install-btn').onclick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('PWA install outcome:', outcome);
    deferredPrompt = null;
    banner.remove();
  };
  document.getElementById('pwa-dismiss-btn').onclick = () => banner.remove();
});

// Nasconde il banner se già installata
window.addEventListener('appinstalled', () => {
  const b = document.getElementById('pwa-install-banner');
  if (b) b.remove();
  console.log('✓ App installata!');
});

</script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" onload="emailjs.init('3k4qc95f0PzeJiGBG')"></script>
</body>
